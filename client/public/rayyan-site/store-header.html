<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css?family=Tajawal:500;700;800" rel="stylesheet">
  <link href="/rayyan-site/assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="/rayyan-site/assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="/rayyan-site/assets/vendor/boxicons/css/boxicons.min.css" rel="stylesheet">
  <link href="/rayyan-site/assets/css/style-ar.css" rel="stylesheet">
  <link href="/rayyan-site/assets/vendor/menu/css/slimmenu.css" rel="stylesheet">
  <style>
    body { margin: 0; padding: 0; overflow: hidden; }
    html { overflow: hidden; }
  </style>
</head>
<body>
  <header class="header-one">
    <div class="top-header">
      <div class="container clearfix">
        <div class="logo float-right">
          <a href="/store" target="_parent"><img src="/rayyan-site/assets/img/logo-ar-new.svg" alt="مياه أبراج"></a>
        </div>
        <div class="address-wrapper d-none d-sm-block float-left ipad" dir="rtl">
          <ul>
            <li class="address" style="position:relative;">
              <a href="/store/cart" target="_parent" style="text-decoration:none;color:inherit;position:relative;display:flex;align-items:center;gap:5px;">
                <span>السلة</span>
                <i class="icon bx bxs-basket" style="position:relative;"></i>
                <span id="cart-count-badge" style="display:none;position:absolute;top:-5px;right:-5px;background:#e53e3e;color:#fff;border-radius:50%;width:18px;height:18px;font-size:11px;line-height:18px;text-align:center;font-weight:bold;">0</span>
              </a>
            </li>
            <li class="address">
              <i class="icon bx bxs-truck"></i>
              <span class="DELIVERYspan">توصيل مجاني</span>
              <h6 class="DELIVERY">للمــــــنزل</h6>
            </li>
          </ul>
        </div>
        <div class="address-wrapper d-block d-sm-none float-right ipad">
          <ul>
            <li class="address" style="position:relative;">
              <a href="/store/cart" target="_parent" style="text-decoration:none;color:inherit;position:relative;display:flex;align-items:center;gap:5px;">
                <span>السلة</span>
                <i class="icon bx bxs-basket" style="position:relative;"></i>
                <span id="cart-count-badge-mobile" style="display:none;position:absolute;top:-5px;right:-5px;background:#e53e3e;color:#fff;border-radius:50%;width:18px;height:18px;font-size:11px;line-height:18px;text-align:center;font-weight:bold;">0</span>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </div>

    <div class="theme-menu-wrapper fixed">
      <div class="container">
        <div class="bg-wrapper clearfix">
          <div class="menu-wrapper float-right" dir="rtl">
            <nav id="mega-menu-holder" class="clearfix">
              <ul class="clearfix">
                <li class="active"><a href="/" target="_parent">الصفحة الرئيسية</a></li>
                <li><a href="/store" target="_parent">من نحن</a></li>
                <li><a href="/store" target="_parent">المنتجات</a></li>
                <li><a href="/store" target="_parent">اطلب اون لاين</a></li>
                <li><a href="/store" target="_parent">جولة في المصنع</a></li>
                <li><a href="/store" target="_parent">الفعاليات</a></li>
                <li><a href="/store" target="_parent">اتصل بنا</a></li>
              </ul>
            </nav>
          </div>
          <div class="right-widget float-left">
            <ul>
              <li class="language-icon">
                <a href="#" id="lang-toggle">English</a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </header>

  <script src="/rayyan-site/assets/vendor/jquery.2.2.3.min.js"></script>
  <script src="/rayyan-site/assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="/rayyan-site/assets/vendor/menu/src/js/jquery.slimmenu.js"></script>
  <script>
    $(document).ready(function() {
      $("#mega-menu-holder").slimmenu({
        resizeWidth: '991',
        animSpeed: 'medium',
        indentChildren: true,
      });
    });

    // Language toggle
    document.getElementById('lang-toggle').addEventListener('click', function(e) {
      e.preventDefault();
      window.parent.postMessage({ type: 'toggle-lang' }, '*');
    });

    // Communicate height to parent
    function sendHeight() {
      var height = document.body.scrollHeight;
      window.parent.postMessage({ type: 'header-height', height: height }, '*');
    }
    window.addEventListener('load', sendHeight);
    window.addEventListener('resize', sendHeight);
    setTimeout(sendHeight, 100);
    setTimeout(sendHeight, 500);

    // Listen for cart count updates from parent React app
    window.addEventListener('message', function(event) {
      if (event.data && event.data.type === 'cart-count') {
        var count = event.data.count || 0;
        var badge = document.getElementById('cart-count-badge');
        var badgeMobile = document.getElementById('cart-count-badge-mobile');
        if (badge) {
          badge.textContent = count;
          badge.style.display = count > 0 ? 'block' : 'none';
        }
        if (badgeMobile) {
          badgeMobile.textContent = count;
          badgeMobile.style.display = count > 0 ? 'block' : 'none';
        }
      }
    });

    // Also read cart from localStorage on load
    try {
      var savedCart = localStorage.getItem('rayyan-cart');
      if (savedCart) {
        var cartItems = JSON.parse(savedCart);
        var totalCount = cartItems.reduce(function(sum, item) { return sum + (item.quantity || 1); }, 0);
        if (totalCount > 0) {
          var badge = document.getElementById('cart-count-badge');
          var badgeMobile = document.getElementById('cart-count-badge-mobile');
          if (badge) { badge.textContent = totalCount; badge.style.display = 'block'; }
          if (badgeMobile) { badgeMobile.textContent = totalCount; badgeMobile.style.display = 'block'; }
        }
      }
    } catch(e) {}
  </script>
</body>
</html>
