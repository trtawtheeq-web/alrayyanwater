  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="icon" type="image/png" href="/rayyan-site/images/logo.png" />
    <link rel="icon" type="image/x-icon" href="/rayyan-site/images/logo.png" />
    <link rel="apple-touch-icon" href="/rayyan-site/images/logo.png" />
    <title>الريان - Rayyan Water Oman</title>    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;500;600;700;800;900&family=Almarai:wght@300;400;700;800&family=Aref+Ruqaa:wght@400;700&family=Reem+Kufi:wght@400;500;600;700&family=Lateef&family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&family=Marhey:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      @font-face {
        font-family: 'Diwani';
        src: url('/fonts/diwani.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
      }
      @font-face {
        font-family: 'DecoType Thuluth II';
        src: url('/fonts/decotype-thuluth-ii.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
      }
    </style>
    <!-- Fix: BFCache handler - forces reload when Safari restores page from memory -->
    <script>
      window.addEventListener('pageshow', function(event) {
        if (event.persisted) {
          window.location.reload();
        }
      });
    </script>
    <!-- Fix: Block any redirect away from /store pages -->
    <script>
      (function() {
        if (window.location.pathname.startsWith('/store')) {
          var origPush = history.pushState;
          var origReplace = history.replaceState;
          history.pushState = function(state, title, url) {
            if (url === '/' || url === '') {
              console.log('[Store Guard] Blocked pushState to /');
              return;
            }
            return origPush.apply(this, arguments);
          };
          history.replaceState = function(state, title, url) {
            if (url === '/' || url === '') {
              console.log('[Store Guard] Blocked replaceState to /');
              return;
            }
            return origReplace.apply(this, arguments);
          };
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
